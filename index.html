<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Comparison</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 0; margin: 0; min-height: 100vh; }

        /* Top Navigation Bar */
        .top-bar { width: 100%; padding: 15px 0; background: #1e1e1e; display: flex; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .btn-new { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-new:hover { background: #0056b3; transform: scale(1.05); }

        /* Viewer Controls */
        .controls { display: none; gap: 20px; margin-bottom: 20px; width: 100%; max-width: 800px; justify-content: space-between; }
        select { padding: 8px; font-size: 16px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; width: 45%; }

        /* Slider Container */
        .comparison-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #000; /* Empty black canvas */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .comparison-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; display: none; }
        #img-overlay { clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }

        #slider { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: ew-resize; z-index: 10; display: none; }
        #slider-line { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; background: white; z-index: 5; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.8); display: none; }

        /* Modal / Overlay Styles */
        #generator-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-content h2 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .row input { flex: 1; padding: 10px; border: 1px solid #555; background: #333; color: white; border-radius: 4px; }

        .modal-actions { display: flex; justify-content: space-between; margin-top: 20px; }
        .btn-add { background: #444; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .btn-add:hover { background: #555; }
        .btn-generate { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-generate:hover { background: #218838; }
        .btn-close { background: transparent; color: #aaa; border: none; cursor: pointer; font-size: 16px; }
        .btn-close:hover { color: white; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-new" onclick="openModal()">New Comparison</button>
    </div>

    <div class="controls" id="controls">
        <select id="left-select"></select>
        <select id="right-select"></select>
    </div>

    <div class="comparison-container" id="canvas">
        <img id="img-base" src="" alt="Right Image">
        <img id="img-overlay" src="" alt="Left Image">
        <div id="slider-line"></div>
        <input type="range" id="slider" min="0" max="100" value="50">
    </div>

    <div id="generator-modal">
        <div class="modal-content">
            <h2>Create New Comparison</h2>
            <div id="input-container">
                <div class="row">
                    <input type="text" class="url-input" placeholder="Imgur URL (e.g. https://i.imgur.com/BSGGbZt.png)">
                    <input type="text" class="name-input" placeholder="Name (e.g. Before)">
                </div>
                <div class="row">
                    <input type="text" class="url-input" placeholder="Imgur URL (e.g. https://i.imgur.com/5G43T3G.png)">
                    <input type="text" class="name-input" placeholder="Name (e.g. After)">
                </div>
            </div>

            <button class="btn-add" onclick="addRow()">+ Add Image</button>

            <div class="modal-actions">
                <button class="btn-close" onclick="closeModal()">Cancel</button>
                <button class="btn-generate" onclick="generateHash()">Generate & View</button>
            </div>
        </div>
    </div>

    <script>
        const IMGUR_BASE = "https://i.imgur.com/";
        let imageCache = {};

        // --- Viewer Logic ---
        function initViewer() {
            const hash = window.location.hash.substring(1);
            const controls = document.getElementById('controls');
            const sliderControls = [document.getElementById('img-base'), document.getElementById('img-overlay'), document.getElementById('slider-line'), document.getElementById('slider')];
            const leftSelect = document.getElementById('left-select');
            const rightSelect = document.getElementById('right-select');

            // Reset UI
            leftSelect.innerHTML = '';
            rightSelect.innerHTML = '';
            imageCache = {};

            if (!hash) {
                // Empty state: Hide controls, keep black canvas
                controls.style.display = 'none';
                sliderControls.forEach(el => el.style.display = 'none');
                return;
            }

            try {
                const decodedString = atob(hash);
                const imageStrings = decodedString.split('|');
                let parsedImages = [];

                imageStrings.forEach((str, index) => {
                    const [id, name] = str.split('~');
                    const fullUrl = IMGUR_BASE + id;
                    parsedImages.push({ id, name, fullUrl });

                    leftSelect.add(new Option(name || `Image ${index + 1}`, fullUrl));
                    rightSelect.add(new Option(name || `Image ${index + 1}`, fullUrl));

                    const img = new Image();
                    img.src = fullUrl;
                    imageCache[fullUrl] = img;
                });

                if (parsedImages.length > 0) {
                    leftSelect.selectedIndex = 0;
                    rightSelect.selectedIndex = parsedImages.length > 1 ? 1 : 0;

                    // Show controls and images
                    controls.style.display = 'flex';
                    sliderControls.forEach(el => el.style.display = 'block');
                    updateImages();
                }
            } catch (e) {
                alert("Failed to parse image hash. It might be broken.");
                console.error(e);
            }
        }

        function updateImages() {
            document.getElementById('img-overlay').src = document.getElementById('left-select').value;
            document.getElementById('img-base').src = document.getElementById('right-select').value;
        }

        document.getElementById('left-select').addEventListener('change', updateImages);
        document.getElementById('right-select').addEventListener('change', updateImages);

        document.getElementById('slider').addEventListener('input', (e) => {
            const percentage = e.target.value;
            document.getElementById('slider-line').style.left = `${percentage}%`;
            document.getElementById('img-overlay').style.clipPath = `polygon(0 0, ${percentage}% 0, ${percentage}% 100%, 0 100%)`;
        });

        // Listen for URL changes so the page updates instantly without a refresh
        window.addEventListener('hashchange', initViewer);


        // --- Generator Modal Logic ---
        function openModal() {
            document.getElementById('generator-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('generator-modal').style.display = 'none';
        }

        function addRow() {
            const container = document.getElementById('input-container');
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="text" class="url-input" placeholder="Imgur URL">
                <input type="text" class="name-input" placeholder="Name">
            `;
            container.appendChild(row);
        }

        function generateHash() {
            const urls = document.querySelectorAll('.url-input');
            const names = document.querySelectorAll('.name-input');
            let parts = [];

            for (let i = 0; i < urls.length; i++) {
                let url = urls[i].value.trim();
                let name = names[i].value.trim() || `Image ${i + 1}`;

                if (url) {
                    // Smarter Regex: Grabs the ID whether it's imgur.com/ID, i.imgur.com/ID.ext, or imgur.com/gallery/ID
                    let match = url.match(/imgur\.com\/(?:gallery\/|a\/)?([a-zA-Z0-9]+)/);

                    if (match && match[1]) {
                        let id = match[1];

                        // Check if the user pasted a direct link that already has an extension
                        let extMatch = url.match(/\.([a-zA-Z0-9]+)$/);

                        // If no extension is found, default to .jpeg
                        let extension = extMatch ? `.${extMatch[1]}` : '.jpeg';

                        // Push the perfectly formatted i.imgur.com data to our array
                        parts.push(`${id}${extension}~${name}`);
                    } else {
                        alert(`Error in row ${i + 1}: Make sure it is a valid Imgur link.`);
                        return;
                    }
                }
            }

            if (parts.length === 0) {
                alert("Please enter at least one valid Imgur URL.");
                return;
            }

            const rawString = parts.join('|');
            const encodedHash = btoa(rawString);

            // Update the URL (this triggers the 'hashchange' event to reload the viewer)
            window.location.hash = encodedHash;

            // Hide the modal
            closeModal();

            // Reset the slider to the middle
            document.getElementById('slider').value = 50;
            document.getElementById('slider-line').style.left = `50%`;
            document.getElementById('img-overlay').style.clipPath = `polygon(0 0, 50% 0, 50% 100%, 0 100%)`;
        }

        // Start the app
        initViewer();
    </script>
</body>
</html>
